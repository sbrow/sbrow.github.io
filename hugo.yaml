baseURL: https://hugo.test/
disableKinds:
  - taxonomy
  - term
enableEmoji: true
enableGitInfo: false
languageCode: en-us
title: One Idiot Developer
markup:
  goldmark:
    parser:
      attribute:
        block: true
    renderer:
      unsafe: true
    extensions:
      extras:
        superscript:
          enable: true
  highlight:
    style: doom-one2
    # style: paraiso-dark
security:
  enableInlineShortcodes: true
params:
  images:
    - avatar.jpg
  icons:
    throw_on_error: true
  socialIcons:
    - name: github
      url: https://github.com/sbrow
    - name: rss
      url: /index.xml
sectionPagesMenu: main
module:
  imports:
    - path: github.com/sbrow/sbrow.github.io/themes/my-theme
